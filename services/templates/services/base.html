<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Servicio Técnico{% endblock %}</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <div class="row"> 
      <div class="col-12 col-md-6">
        <a class="navbar-brand" href="/">Servicio Técnico</a>
      </div>
    </div>
  </div>
  <a href="{% url 'workshop_panel' %}" class="btn btn-dark">
    Panel del Taller
  </a>
  <a href="/panel/" class="btn btn-success">
        Panel de cliente
  </a>
  <a href="/check-order/" class="btn btn-warning">
        Consultar reparación
  </a>
  <a href="{% url 'track_order' %}" class="btn btn-outline-light ms-2">
        Status reparación
  </a>
</nav>

<div class="container mt-4">
    {% block content %}
    {% endblock %}
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
