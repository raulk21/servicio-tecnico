<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Servicio Técnico{% endblock %}</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">

    <a class="navbar-brand" href="/">Servicio Técnico</a>

    <!-- Botón hamburguesa móvil -->
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMain">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarMain">

      <div class="navbar-nav ms-auto">

        <a href="{% url 'workshop_panel' %}" class="btn btn-dark me-2 mb-2">
          Panel del Taller
        </a>

        <a href="/panel/" class="btn btn-success me-2 mb-2">
          Panel cliente
        </a>

        <a href="/check-order/" class="btn btn-warning me-2 mb-2">
          Consultar reparación
        </a>

        <a href="{% url 'track_order' %}" class="btn btn-outline-light mb-2">
          Status reparación
        </a>

      </div>

    </div>

  </div>
</nav>

<div class="container mt-4">
    {% block content %}
    {% endblock %}
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
