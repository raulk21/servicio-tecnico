<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Servicio Técnico{% endblock %}</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
      .whatsapp-float {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background-color: #25D366;
      color: white;
      padding: 14px 18px;
      border-radius: 30px;
      font-size: 16px;
      text-decoration: none;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      z-index: 1000;
    }

      .whatsapp-float:hover {
      background-color: #20b955;
    }
</style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">

    <a class="navbar-brand fw-bold" href="/">
      <i class="bi bi-cpu"></i> Servicio Técnico
    </a>

    <!-- Botón móvil -->
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMain">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarMain">

      <ul class="navbar-nav ms-auto align-items-lg-center">

        <li class="nav-item">
          <a class="nav-link" href="/">
            <i class="bi bi-house"></i> Inicio
          </a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="/">
            <i class="bi bi-tools"></i> Servicios
          </a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="/check-order/">
            <i class="bi bi-search"></i> Consultar reparación
          </a>
        </li>

        <li class="nav-item">
          <a class="btn btn-success ms-lg-3 mt-2 mt-lg-0" href="/panel/">
            <i class="bi bi-person"></i> Panel cliente
          </a>
        </li>

        <li class="nav-item">
          <a class="btn btn-warning ms-lg-2 mt-2 mt-lg-0" href="{% url 'workshop_panel' %}">
            <i class="bi bi-wrench"></i> Panel técnico
          </a>
        </li>

      </ul>

    </div>
  </div>
</nav>

<div class="container mt-4">
    {% block content %}
    {% endblock %}
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<a href="https://wa.me/+5491150410180?text=Hola%20quiero%20consultar%20sobre%20una%20reparacion"
   class="whatsapp-float"
   target="_blank">
💬 WhatsApp
</a>
</body>
</html>
