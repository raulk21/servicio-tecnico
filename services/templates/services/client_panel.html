<div class="container mt-4">

  <div class="row justify-content-center">

      <div class="col-12 col-md-8 col-lg-6">

      <div class="card shadow">
        <div class="card-body">

          <h4 class="text-center mb-4">Panel del Cliente</h4>

          <form method="GET">

            <div class="mb-3">
              <label class="form-label">Correo electrónico</label>
              <input type="email" name="email" class="form-control form-control-lg" placeholder="cliente@email.com" required>
            </div>

            <div class="d-grid">
              <button type="submit" class="btn btn-primary btn-lg"></button>
            </div>

          </form>

          {% if orders %}

           <div class="table-responsive mt-4">
            <table class="table table-striped table-hover">
              <thead>
                <tr>
                  <th>Orden</th>
                  <th>Equipo</th>
                  <th>Estado</th>
                  <th>Fecha</th>
                  <th></th>
                </tr>
              </thead>
              <tbody>
                  {% for order in orders %}
                  <tr>
                    <td>{{ order.order_number }}</td>
                    <td>{{ order.device }}</td>
                    <td>{{ order.status }}</td>
                    <td>{{ order.created_at }}</td>
                    <td>
                        <a href="{% url 'order_detail' order.order_number %}" class="btn btn-sm btn-dark">
                          Ver detalle
                        </a>
                    </td>
                  </tr>
          {% endfor %}
      </tbody>
  </table>
</div>
    {% endif %}


        </div>
      </div>

    </div>
  </div>

</div>
